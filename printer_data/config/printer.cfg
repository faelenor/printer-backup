[include mainsail.cfg]
[include toolhead.cfg]
[include cartographer.cfg]
[include steppers.cfg]
[include extruder.cfg]
[include heater_bed.cfg]
[include lights.cfg]
[include macros/*.cfg]

[mcu]
canbus_uuid: 570756979ba3

[save_variables]
filename: ~/printer_data/config/variables.txt

[printer]
kinematics = corexy
max_velocity = 750
max_accel = 10000
max_z_velocity = 30
max_z_accel = 500
square_corner_velocity = 10

[temperature_sensor MCU]
sensor_type: temperature_mcu

[temperature_sensor SoC]
sensor_type: temperature_host

[virtual_sdcard]
path: ~/printer_data/gcodes

[force_move]
enable_force_move: true

[pause_resume]

[display_status]

[respond]

[exclude_object]

[idle_timeout]
# only turn off motors and heaters if the printer is not paused
gcode:
    {% if not (printer.pause_resume.is_paused) %}
        RESPOND MSG="Idle timeout reached"
        TURN_OFF_HEATERS
        M84
        #halo_off
        #SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=hotend_fan TARGET=45
        #SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=chamber_heater TARGET=0

    {% endif %}
timeout: 7200

[safe_z_home]
home_xy_position: 175, 175
speed: 300
z_hop: 20

[quad_gantry_level]
gantry_corners: 
	-60,-10
	410,420
points: 
    30,30
    30,300
    320,300
    320,30
speed: 750
horizontal_move_z: 5
retries: 8
retry_tolerance: 0.0075
max_adjust: 10

# Enable arcs support
[gcode_arcs]
resolution: 0.1

[input_shaper]
shaper_freq_x: 53
shaper_type_x: mzv
shaper_freq_y: 41.4
shaper_type_y: mzv

