[extruder]
step_pin: toolhead:gpio18
dir_pin: toolhead:gpio19
enable_pin: !toolhead:gpio17
nozzle_diameter: 0.400
filament_diameter: 1.750
max_extrude_only_distance: 110
max_extrude_cross_section: 5
heater_pin: toolhead:gpio7
sensor_type: MAX31865
sensor_pin: toolhead:gpio9
spi_software_sclk_pin: toolhead:gpio10
spi_software_mosi_pin: toolhead:gpio8
spi_software_miso_pin: toolhead:gpio11
rtd_nominal_r: 100
rtd_reference_r: 430
rtd_num_of_wires: 2

control: pid_v
#pid_kp: 23.568
#pid_ki: 1.672
#pid_kd: 83.076
min_temp: 0
max_temp: 320
pressure_advance_smooth_time: 0.02
rotation_distance: 47.088
gear_ratio: 9:1
microsteps: 16

[tmc2209 extruder]
uart_pin: toolhead:gpio20
run_current: 0.6
sense_resistor: 0.110

[autotune_tmc extruder]
motor: ldo-36sth20-1004ahg-9T

[firmware_retraction]
retract_length = 0.6
retract_speed = 35
unretract_speed = 30
