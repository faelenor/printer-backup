[gcode_macro START_PRINT]
gcode:
	{% set BED_TEMP=params.BED_TEMP|default(70)|float %}
	{% set EXTRUDER_TEMP=params.EXTRUDER_TEMP|default(150)|float %}

    LIGHT_ON

    SET_GCODE_OFFSET Z=0 ; Reset Z offset

    {% if printer.toolhead.homed_axes != "xyz" %}
      RESPOND MSG="Homing"
      G28
    {% endif %}
    
    G90 ; Set to absolute positioning

    RESPOND MSG="Heating bed"
    M104 S150 ; Heat nozzle to soften filament leftovers
    M190 S{BED_TEMP}

    RESPOND MSG="Leveling"
    QUAD_GANTRY_LEVEL
    RESPOND MSG="Waiting for hotend to reach 150C"
    M109 S150 ; Ensure nozzle is at 150C, in case it was hot when print started.
    RESPOND MSG="Touch calibration"
    CARTOGRAPHER_TOUCH_HOME ; Home for real Z0
    RESPOND MSG="Bed mesh"
    BED_MESH_CALIBRATE

	M83

    RESPOND MSG="Heating extruder to print temperature"
	# Heat the extruder to the desired temperature
	M104 S{EXTRUDER_TEMP}
	M109 S{EXTRUDER_TEMP}

    RESPOND MSG="Printing prime line"
	# Prime line sequence
	G1 Z5 F3000 ; lift
	G1 X20 Y5 F1500 ; move to prime position
	G1 Z0.15 F3000 ; get ready to prime
	G92 E0 ; reset extrusion distance
	G1 X60 E60 F600 ; prime nozzle with adjusted extrusion / E__ based on how much you like
	
	# String removal circle after priming
	G1 Z0.2 F3000 ; adjust to 0.2mm above the bed
	G1 Y15 F10000 ; move the toolhead in the Y direction by 15 units
	
	# Execute the circle 3 times
	G2 I-5 J0 F10000 ; circle with 5mm radius
	G2 I-5 J0 F10000
	G2 I-5 J0 F10000

    RESPOND MSG="Starting!"
    