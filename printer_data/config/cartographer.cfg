[mcu cartographer]
canbus_uuid: 12977859f740

[cartographer]
mcu: cartographer
x_offset: 0
y_offset:27
verbose: no

[bed_mesh]
zero_reference_position: 180, 180
speed: 600
horizontal_move_z: 3
mesh_min: 30, 30
mesh_max: 330, 330
probe_count: 20, 20
adaptive_margin: 10
mesh_pps: 0, 0

[temperature_sensor cartographer]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 5
max_temp: 105

[adxl345 cartographer]
cs_pin: cartographer:PA3
spi_bus: spi1

[resonance_tester]
accel_chips: adxl345 cartographer, adxl345 toolhead
probe_points:
    175, 175, 20

[gcode_macro TAP_DATA]
gcode:
    G28
    G1 Z5 F1200
    M400 ; wait until motor movement finishes
    G4 P1000; wait a second so the printer doesn't shake
    CARTOGRAPHER_STREAM ACTION=START FILE=tapdata2mms.csv
    G1 Z-0.75 F120
    M400 ; wait until motor movement finishes
    G4 P1000; wait a second so the printer doesn't shake
    CARTOGRAPHER_STREAM ACTION=STOP FILE=tapdata2mms.csv
    G1 Z5 F1200
    G28
    G1 Z5 F1200
    M400 ; wait until motor movement finishes
    G4 P1000; wait a second so the printer doesn't shake
    CARTOGRAPHER_STREAM ACTION=START FILE=tapdata3mms.csv
    G1 Z-0.75 F200
    M400 ; wait until motor movement finishes
    G4 P1000; wait a second so the printer doesn't shake
    CARTOGRAPHER_STREAM ACTION=STOP FILE=tapdata3mms.csv
    G1 Z10 F800
